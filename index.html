<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Planner</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>
    <h1>🏠 Family Planner</h1>
    <p>Dan, Mukta, Tara, Aurora & Milo 🐈‍⬛</p>
</header>

<nav>
    <button onclick="showTab('shopping')">🛒 Shopping</button>
    <button onclick="showTab('meals')">🍽 Meals</button>
    <button onclick="showTab('favourites')">⭐ Favourites</button>
</nav>

<main>

<section id="shopping">
    <h2>🛒 Shopping</h2>

<div class="shopping-category">
<h3>
    🍽 Meal Ingredients
    <button onclick="addMealIngredient()">➕</button>
</h3>

 <div id="mealIngredients">

<label><input type="checkbox"> Chicken Breast</label><br>
<label><input type="checkbox"> Salmon Fillets</label><br>
<label><input type="checkbox"> Rice</label><br>
<label><input type="checkbox"> Pizza Bases</label>

</div>

<div class="shopping-category">
    <h3>⭐ Weekly Staples</h3>

    <label><input type="checkbox"> Milk</label><br>
    <label><input type="checkbox"> Bread</label><br>
    <label><input type="checkbox"> Eggs</label>
</div>

<div class="shopping-category">
    <h3>🐈 Milo</h3>

    <label><input type="checkbox"> Cat Food</label><br>
    <label><input type="checkbox"> Cat Litter</label>
</div>

</section>

<section id="meals" style="display:none;">
    <h2>🍽 Meals</h2>
    <p>Meal planner coming soon...</p>
</section>
    
<section id="favourites" style="display:none;">
    <h2>⭐ Favourites</h2>
    <p>Favourite recipes coming soon...</p>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
