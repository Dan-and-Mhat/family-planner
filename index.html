<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Planner</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>
    <h1>🏠 Family Planner</h1>
    <p>Dan, Mukta, Tara, Aurora & Milo 🐈‍⬛</p>
</header>

<nav>
    <button onclick="showTab('shopping')">🛒 Shopping</button>
    <button onclick="showTab('meals')">🍽 Meals</button>
    <button onclick="showTab('favourites')">⭐ Favourites</button>
</nav>

<main>

<section id="shopping">
    <h2>🛒 Shopping</h2>

<div class="shopping-category">
<h3>
    🍽 Meal Ingredients
    <button onclick="addItem('mealIngredients')">➕</button>
</h3>
<div id="mealIngredients">

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Chicken Breast
    </span>
    <button class="edit-btn" onclick="editItem(this)">✏️</button>
    <button class="delete-btn" onclick="deleteItem(this)">🗑</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Salmon Fillets
    </span>
    <button class="edit-btn" onclick="editItem(this)">✏️</button>
    <button class="delete-btn" onclick="deleteItem(this)">🗑</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Rice
    </span>
    <button class="edit-btn" onclick="editItem(this)">✏️</button>
    <button class="delete-btn" onclick="deleteItem(this)">🗑</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Pizza Base
    </span>
    <button class="edit-btn" onclick="editItem(this)">✏️</button>
    <button class="delete-btn" onclick="deleteItem(this)">🗑</button>
</label>

</div>

<div class="shopping-category">
    <h3>
        ⭐ Weekly Staples
        <button onclick="addItem('weeklyStaples')">➕</button>
    </h3>

    <div id="weeklyStaples">

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Milk
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Bread
    </span>

<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Eggs
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

</div>

<div class="shopping-category">
    <h3>
        🐈 Milo
        <button onclick="addItem('miloItems')">➕</button>
    </h3>

    <div id="miloItems">

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Dried Food
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Wet Food
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Treats
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

</div>

</section>

<section id="meals" style="display:none;">
    <h2>🍽 Weekly Meal Plan</h2>

    <div class="meal-plan">

        <label>Monday</label>
        <input id="mondayMeal" placeholder="e.g. Korma">

        <label>Tuesday</label>
        <input id="tuesdayMeal" placeholder="e.g. Pizza">

        <label>Wednesday</label>
        <input id="wednesdayMeal" placeholder="e.g. Salmon">

        <label>Thursday</label>
        <input id="thursdayMeal" placeholder="e.g. Pasta">

        <label>Friday</label>
        <input id="fridayMeal" placeholder="e.g. Burgers">

        <label>Saturday</label>
        <input id="saturdayMeal" placeholder="e.g. Roast">

        <label>Sunday</label>
        <input id="sundayMeal" placeholder="e.g. Curry">

    </div>
</section>

<div id="favouriteMeals">

    <label class="shopping-item">
        <span>🍛 Korma</span>
    </label>

    <label class="shopping-item">
        <span>🍕 Pizza</span>
    </label>

    <label class="shopping-item">
        <span>🐟 Salmon</span>
    </label>

</div>

<button onclick="addFavouriteMeal()">
    ➕ Add Favourite Meal
</button>

</main>

<script src="app.js"></script>

</body>
</html>
