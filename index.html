<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Planner</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>
    <h1>🏠 Family Planner</h1>
    <p>Dan, Mukta, Tara, Aurora & Milo 🐈‍⬛</p>
</header>

<nav>
    <button onclick="showTab('shopping')">🛒 Shopping</button>
    <button onclick="showTab('meals')">🍽 Meals</button>
    <button onclick="showTab('favourites')">⭐ Favourites</button>
</nav>

<main>

<section id="shopping">
    <h2>🛒 Shopping</h2>

<div class="shopping-category">
<h3>
    🍽 Meal Ingredients
    <button onclick="addMealIngredient()">➕</button>
</h3>

 <div id="mealIngredients">

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Chicken Breast
    </span>

    <button class="delete-btn"
            onclick="deleteItem(this)">
        🗑
    </button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Salmon Fillets
    </span>

    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Rice
    </span>

    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Pizza Base
    </span>
    
    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>
</div>
    
<div class="shopping-category">
    <h3>⭐ Weekly Staples</h3>
    
<label class="shopping-item">
    <span>
        <input type="checkbox">
        Milk
    </span>

    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Bread
    </span>

    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Eggs
    </span>

    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>

</div>

<div class="shopping-category">
    <h3>🐈 Milo</h3>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Dried Food
    </span>

    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Wet Food
    </span>

    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Treats
    </span>

    <button
        class="delete-btn"
        onclick="deleteItem(this)">
        🗑
    </button>
</label>

</div>

</section>

<section id="meals" style="display:none;">
    <h2>🍽 Meals</h2>
    <p>Meal planner coming soon...</p>
</section>
    
<section id="favourites" style="display:none;">
    <h2>⭐ Favourites</h2>
    <p>Favourite recipes coming soon...</p>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
