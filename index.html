<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Planner</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>
    <h1>🏠 Family Planner</h1>
    <p>Dan, Mukta, Tara, Aurora & Milo 🐈‍⬛</p>
</header>

<nav>
    <button onclick="showTab('shopping')">🛒 Shopping</button>
    <button onclick="showTab('meals')">🍽 Meals</button>
    <button onclick="showTab('favourites')">⭐ Favourites</button>
</nav>

<main>

<section id="shopping">
    <h2>🛒 Shopping</h2>

<div class="shopping-category">
<h3>
    🍽 Meal Ingredients
    <button onclick="addItem('mealIngredients')">➕</button>
</h3>
<div id="mealIngredients">

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Chicken Breast
    </span>
    <button class="edit-btn" onclick="editItem(this)">✏️</button>
    <button class="delete-btn" onclick="deleteItem(this)">🗑</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Salmon Fillets
    </span>
    <button class="edit-btn" onclick="editItem(this)">✏️</button>
    <button class="delete-btn" onclick="deleteItem(this)">🗑</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Rice
    </span>
    <button class="edit-btn" onclick="editItem(this)">✏️</button>
    <button class="delete-btn" onclick="deleteItem(this)">🗑</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Pizza Base
    </span>
    <button class="edit-btn" onclick="editItem(this)">✏️</button>
    <button class="delete-btn" onclick="deleteItem(this)">🗑</button>
</label>

</div>

<div class="shopping-category">
    <h3>
        ⭐ Weekly Staples
        <button onclick="addItem('weeklyStaples')">➕</button>
    </h3>

    <div id="weeklyStaples">

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Milk
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Bread
    </span>

<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Eggs
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

</div>

<div class="shopping-category">
    <h3>
        🐈 Milo
        <button onclick="addItem('miloItems')">➕</button>
    </h3>

    <div id="miloItems">

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Dried Food
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Wet Food
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

<label class="shopping-item">
    <span>
        <input type="checkbox">
        Treats
    </span>
<button
    class="edit-btn"
    onclick="editItem(this)">
    ✏️
</button>

<button
    class="delete-btn"
    onclick="deleteItem(this)">
    🗑
</button>
</label>

</div>
</div>
</section>
    
<div id="weeklySummary" class="summary-card">
    <h3>📅 This Week</h3>
    <div id="summaryContent"></div>
</div>
    
<section id="meals" style="display:none;">
    <h2>🍽 Weekly Meal Plan</h2>

    <div class="meal-plan">

        <div class="meal-card">
            <h3>🍽 Monday</h3>
            <input id="mondayMeal" placeholder="Dinner">
        </div>

        <div class="meal-card">
            <h3>🍽 Tuesday</h3>
            <input id="tuesdayMeal" placeholder="Dinner">
        </div>

        <div class="meal-card">
            <h3>🍽 Wednesday</h3>
            <input id="wednesdayMeal" placeholder="Dinner">
        </div>

        <div class="meal-card">
            <h3>🍽 Thursday</h3>
            <input id="thursdayMeal" placeholder="Dinner">
        </div>

        <div class="meal-card">
            <h3>🍽 Friday</h3>
            <input id="fridayMeal" placeholder="Dinner">
        </div>

        <div class="meal-card">
            <h3>🍽 Saturday</h3>
            <input id="saturdayMeal" placeholder="Dinner">
        </div>

        <div class="meal-card">
            <h3>🍽 Sunday</h3>
            <input id="sundayMeal" placeholder="Dinner">
        </div>

    </div>
</section>

<section id="favourites" style="display:none;">

    <h2>⭐ Favourite Meals</h2>

    <div id="favouriteMeals">

        <label class="shopping-item">
            <span>🍛 Korma</span>
        </label>

        <label class="shopping-item">
            <span>🍕 Pizza</span>
        </label>

        <label class="shopping-item">
            <span>🐟 Salmon</span>
        </label>

    </div>

    <button onclick="addFavouriteMeal()">
        ➕ Add Favourite Meal
    </button>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
